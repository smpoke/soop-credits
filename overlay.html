<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>방송 엔딩 크레딧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1210;
    --gold: #e3b23c;
    --silver: #c9d3d6;
    --bronze: #c98455;
    --mint: #6fd8a5;
    --violet: #b69cd8;
    --text: #f3efe4;
    --muted: #8a938d;
    --hairline: rgba(227, 178, 60, 0.25);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
  }

  #stage {
    position: fixed;
    inset: 0;
    display: none;
  }

  #stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .star {
    position: absolute;
    bottom: -10px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.35;
    animation: drift linear infinite;
  }
  @keyframes drift {
    from { transform: translateY(0); opacity: 0; }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.2; }
    to   { transform: translateY(-110vh); opacity: 0; }
  }

  #scroller {
    position: absolute;
    left: 50%;
    top: 0;
    width: min(640px, 88vw);
    transform: translateX(-50%) translateY(100vh);
    text-align: center;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin: 0 0 6px;
  }

  h1.title {
    font-family: 'Black Han Sans', sans-serif;
    font-weight: 400;
    font-size: 42px;
    line-height: 1.3;
    margin: 0 0 8px;
    color: var(--text);
  }

  .subdate {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 90px;
  }

  section.credit-section {
    margin-bottom: 72px;
  }

  section.credit-section .eyebrow.mint { color: var(--mint); }
  section.credit-section .eyebrow.violet { color: var(--violet); }
  section.credit-section .eyebrow.muted { color: var(--muted); }

  h2.section-title {
    font-family: 'Black Han Sans', sans-serif;
    font-weight: 400;
    font-size: 24px;
    margin: 0 0 26px;
  }

  hr.rule {
    border: none;
    border-top: 1px solid var(--hairline);
    width: 64px;
    margin: 0 auto 26px;
  }

  .line {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 10px;
    font-size: 17px;
    padding: 7px 0;
  }

  .line .nick { color: var(--text); font-weight: 500; }
  .line .rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    width: 22px;
    text-align: right;
  }
  .line .stay { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  .line.top3 {
    font-size: 23px;
    padding: 12px 0;
  }
  .line.top3 .rank {
    font-size: 26px;
    width: 34px;
  }
  .line.top3 .nick { font-weight: 700; }
  .line.gold .nick, .line.gold .rank { color: var(--gold); text-shadow: 0 0 14px rgba(227,178,60,0.45); }
  .line.silver .nick, .line.silver .rank { color: var(--silver); }
  .line.bronze .nick, .line.bronze .rank { color: var(--bronze); }
  .line .amount { color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 15px; }
  .line .count { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .empty {
    color: var(--muted);
    font-size: 14px;
    font-style: normal;
  }

  .closing {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.12em;
    color: var(--gold);
    font-size: 13px;
    margin-top: 40px;
    padding-bottom: 40vh;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="stars"></div>
  <div id="scroller"></div>
</div>

<script>
const PIXELS_PER_SECOND = 55;

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function section(eyebrowText, eyebrowClass, titleText, innerHtml) {
  return `
    <section class="credit-section">
      <p class="eyebrow ${eyebrowClass}">${eyebrowText}</p>
      <h2 class="section-title">${titleText}</h2>
      <hr class="rule">
      ${innerHtml}
    </section>`;
}

function rankSpan(i) {
  if (i === 0) return { cls: 'line top3 gold', rank: '🥇' };
  if (i === 1) return { cls: 'line top3 silver', rank: '🥈' };
  if (i === 2) return { cls: 'line top3 bronze', rank: '🥉' };
  return { cls: 'line', rank: String(i + 1) };
}

function renderCredits(data) {
  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;

  let html = `
    <p class="eyebrow">TODAY'S BROADCAST</p>
    <h1 class="title">오늘도 함께해주셔서<br>감사합니다</h1>
    <p class="subdate">${dateStr}</p>
  `;

  let donationBody;
  if (!data.donations.length) {
    donationBody = `<p class="empty">오늘은 없었어요</p>`;
  } else {
    donationBody = data.donations.map((d, i) => {
      const r = rankSpan(i);
      return `<p class="${r.cls}"><span class="rank">${r.rank}</span><span class="nick">${esc(d.nickname)}</span><span class="amount">★ ${d.total}</span></p>`;
    }).join('');
  }
  html += section('DONATION · 후원 TOP 10', '', '별풍선 &amp; 후원을 보내주신 분들', donationBody);

  let subBody;
  if (!data.subscriptions.length) {
    subBody = `<p class="empty">오늘은 없었어요</p>`;
  } else {
    subBody = data.subscriptions.map((s, i) => {
      const r = rankSpan(i);
      return `<p class="${r.cls}"><span class="rank">${r.rank}</span><span class="nick">${esc(s.nickname)}</span>${s.count > 1 ? `<span class="count">x${s.count}</span>` : ''}</p>`;
    }).join('');
  }
  html += section('SUBSCRIBE · 구독 TOP 10', 'violet', '구독해주신 분들', subBody);

  let chatBody;
  if (!data.chat.length) {
    chatBody = `<p class="empty">오늘은 없었어요</p>`;
  } else {
    chatBody = data.chat.map((c, i) => {
      const r = rankSpan(i);
      return `<p class="${r.cls}"><span class="rank">${r.rank}</span><span class="nick">${esc(c.nickname)}</span><span class="count">${c.count}회</span></p>`;
    }).join('');
  }
  html += section('CHAT · 채팅 TOP 10', 'mint', '채팅으로 함께해주신 분들', chatBody);

  let stayBody;
  if (!data.stay.length) {
    stayBody = `<p class="empty">오늘은 없었어요</p>`;
  } else {
    stayBody = data.stay.map((c, i) => {
      const r = rankSpan(i);
      return `<p class="${r.cls}"><span class="rank">${r.rank}</span><span class="nick">${esc(c.nickname)}</span><span class="stay">${c.stayMinutes}분</span></p>`;
    }).join('');
  }
  html += section('STAY · 시청시간 TOP 10', 'muted', '오래 함께해주신 분들', stayBody);

  html += `<p class="closing">✦ 다음 방송에서 또 만나요 ✦</p>`;

  return html;
}

function spawnStars() {
  const layer = document.getElementById('stars');
  layer.innerHTML = '';
  const count = 22;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    const duration = 8 + Math.random() * 10;
    const delay = Math.random() * duration;
    s.style.animationDuration = duration + 's';
    s.style.animationDelay = '-' + delay + 's';
    layer.appendChild(s);
  }
}

function playCredits(data) {
  const stage = document.getElementById('stage');
  const scroller = document.getElementById('scroller');

  scroller.innerHTML = renderCredits(data);
  stage.style.display = 'block';
  spawnStars();

  scroller.style.transition = 'none';
  scroller.style.transform = 'translateX(-50%) translateY(100vh)';

  requestAnimationFrame(() => {
    const contentHeight = scroller.scrollHeight;
    const distance = window.innerHeight + contentHeight;
    const duration = distance / PIXELS_PER_SECOND;

    scroller.offsetHeight;
    scroller.style.transition = `transform ${duration}s linear`;
    scroller.style.transform = `translateX(-50%) translateY(-${contentHeight}px)`;

    setTimeout(() => {
      stage.style.display = 'none';
    }, duration * 1000 + 400);
  });
}

const API_BASE = new URLSearchParams(location.search).get('api') || '';

async function start() {
  try {
    const res = await fetch(API_BASE + '/api/credits', {
      headers: { 'ngrok-skip-browser-warning': 'true' }
    });
    const data = await res.json();
    playCredits(data);
  } catch (e) {
    setTimeout(start, 1000);
  }
}

start();
</script>
</body>
</html>
